workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    integrations:
      app_store_connect: fourName
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.RoyalsTigerGuide.app
      vars:
        BUNDLE_ID: "com.RoyalsTigerGuide.app"
        XCODE_PROJECT: "RoyalsTigerGuide.xcodeproj"
        XCODE_SCHEME: "RoyalsTigerGuide"
        APP_STORE_APPLE_ID: "6760774470"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa for distribution
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
